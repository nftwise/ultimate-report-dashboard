<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Swarm - Pixel Rooms</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #181818;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            height: 100vh;
            overflow: hidden;
            gap: 15px;
            padding: 15px;
        }

        #game-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 4px solid #f8f8f8;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 0 0 4px #484848, 0 10px 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        #game-container {
            flex: 1;
            position: relative;
            /* HD Pixel Art Background */
            background: url('bg_pixel_rooms.png') center/contain no-repeat;
            background-color: #181818;
            image-rendering: pixelated;
        }

        /* The canvas will hold the agents on top of the bg image */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            image-rendering: pixelated;
        }

        /* Dialog Box (Pokemon Style) */
        #dialog-box {
            position: absolute;
            bottom: 25px;
            left: 5%;
            width: 90%;
            height: 110px;
            background: #f8f8f8;
            border: 4px solid #606060;
            border-radius: 8px;
            display: flex;
            padding: 12px;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.2s;
            pointer-events: none;
            box-shadow: inset -3px -3px 0 #d8d8d8, 4px 4px 0 rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        #dialog-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        #portrait {
            width: 76px;
            height: 76px;
            background: #a8a8a8;
            border: 3px solid #606060;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            image-rendering: pixelated;
        }

        #dialog-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 4px;
        }

        #dialog-name {
            color: #d84040;
            font-size: 14px;
            text-shadow: 1px 1px 0 #f8b0b0;
        }

        #dialog-msg {
            color: #101010;
            font-size: 11px;
            line-height: 1.8;
            font-weight: bold;
        }

        /* UI Panel */
        #ui-panel {
            width: 320px;
            background: #282828;
            border: 4px solid #f8f8f8;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            box-shadow: 0 0 0 4px #484848;
        }

        h2 {
            font-size: 12px;
            color: #fff;
            text-align: center;
            background: #f0b90b;
            color: #111;
            padding: 12px;
            border: 2px solid #fff;
            border-radius: 4px;
            box-shadow: 3px 3px 0 #181818;
            margin-bottom: 5px;
        }

        .panel-box {
            background: #e8e8e8;
            border: 4px solid #b0b0b0;
            padding: 15px;
            border-radius: 4px;
            color: #000;
            box-shadow: inset 2px 2px 0 rgba(0, 0, 0, 0.1);
        }

        .agent-status {
            font-size: 9px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #a0a0a0;
            padding-bottom: 8px;
            font-weight: bold;
            line-height: 1.4;
        }

        .agent-status:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .agent-status span.name {
            color: #000;
        }

        .agent-status span.state {
            background: #68a840;
            border: 2px solid #488820;
            padding: 4px 6px;
            border-radius: 4px;
            color: #fff;
            font-size: 8px;
        }

        .agent-status span.state.busy {
            background: #f6465d;
            border: 2px solid #b32a39;
        }

        button {
            display: block;
            width: 100%;
            background: #f8d030;
            color: #111;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            border: 2px solid #fff;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 2px 2px 0 #181818;
        }

        button:last-child {
            margin-bottom: 0;
        }

        button:hover {
            background: #ffd850;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #181818;
        }

        button:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #181818;
        }

        .header-title {
            font-size: 9px;
            color: #505050;
            margin-bottom: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="game-wrapper">
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="dialog-box">
            <div id="portrait"><canvas id="portraitCanvas" width="60" height="60"></canvas></div>
            <div id="dialog-text">
                <div id="dialog-name">Queen System</div>
                <div id="dialog-msg">The Mega Hive is fully loaded! Rooms are separated by department!</div>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <h2>BEE MEGA HIVE</h2>

        <div class="panel-box">
            <div id="statusList">
                <div class="agent-status" id="Agent_SEO"><span class="name">Analyst (SEO)</span> <span
                        class="state">IDLE</span></div>
                <div class="agent-status" id="Agent_ADS"><span class="name">Scout (Ads)</span> <span
                        class="state">IDLE</span></div>
                <div class="agent-status" id="Agent_DEV"><span class="name">Worker (Dev)</span> <span
                        class="state">IDLE</span></div>
            </div>
        </div>

        <div class="panel-box">
            <div class="header-title">WORK TASKS</div>
            <button onclick="triggerTask('Analyst (SEO)', 'workstation')">Go to Workspace</button>
            <button onclick="triggerTask('Scout (Ads)', 'library')">Read in Library</button>
            <button onclick="triggerTask('Worker (Dev)', 'bulletin')">Check the Board</button>

            <div class="header-title" style="margin-top:15px;">BREAK TIME</div>
            <button onclick="triggerTask('Worker (Dev)', 'kitchen')">Coffee Kitchen</button>
            <button onclick="triggerTask('Scout (Ads)', 'lounge')">TV Lounge</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pCanvas = document.getElementById('portraitCanvas');
        const pCtx = pCanvas.getContext('2d');
        const container = document.getElementById('game-container');

        ctx.imageSmoothingEnabled = false;
        pCtx.imageSmoothingEnabled = false;

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 4 Distinct Rooms Based on the new BG
        const POI = {
            workstation: [{ x: 0.2, y: 0.15 }, { x: 0.35, y: 0.15 }, { x: 0.25, y: 0.3 }], // Top-Left room
            library: [{ x: 0.8, y: 0.3 }, { x: 0.7, y: 0.3 }], // Top-Right room table
            lounge: [{ x: 0.15, y: 0.8 }, { x: 0.25, y: 0.8 }], // Bottom-Left room sofas
            kitchen: [{ x: 0.7, y: 0.75 }, { x: 0.8, y: 0.85 }], // Bottom-Right room kitchen
            bulletin: [{ x: 0.35, y: 0.45 }, { x: 0.65, y: 0.45 }], // Hallway boards
            hub: [{ x: 0.5, y: 0.5 }, { x: 0.5, y: 0.55 }, { x: 0.45, y: 0.45 }] // Center crossing
        };

        // Pixel Art Bee Avatar & Sprites (Larger and more realistic relative sizes)
        const P = {
            ' ': 'transparent', '0': '#101018',
            'Y': '#f0b90b', 'y': '#cf9c02', // Yellow/Gold
            'W': '#ffffff', 'w': '#b8e3ea', // Wings
            'P': '#1e93ff', 'p': '#0a6ab8', // Blue Bee
            'R': '#f6465d', 'r': '#ba2133'  // Red Bee
        };
        function buildSprite(lines, scale = 1) {
            const size = 16;
            const c = document.createElement('canvas');
            c.width = size * scale; c.height = size * scale;
            const cx = c.getContext('2d');
            for (let y = 0; y < size; y++) {
                if (!lines[y]) continue;
                for (let x = 0; x < size; x++) {
                    const char = lines[y][x];
                    if (char && P[char] && P[char] !== 'transparent') {
                        cx.fillStyle = P[char];
                        cx.fillRect(x * scale, y * scale, scale, scale);
                    }
                }
            }
            return c;
        }

        const sprites = {};

        // High-res looking pixel bee (16x16 canvas scaled up)
        const beeBody1 = [
            "  w0  0w        ",
            "  wWwwWw        ",
            " wWWwwWWw       ",
            " wWWwwWWw       ",
            "  000000        ",
            " 0YYYYYY0       ",
            "0Y00YY00Y0      ",
            "0YYYYYYYY0      ",
            " 00000000       ",
            " 0YYYYYY0       ",
            " 00000000       ",
            "  0YYYY0        ",
            "   0000         ",
            "    00          ",
            "                ",
            "                "
        ];
        const beeBodyWalk1 = [
            "  0    0        ",
            "  wWwwWw        ",
            " wWWwwWWw       ",
            "  000000        ",
            " 0YYYYYY0       ",
            "0Y00YY00Y0      ",
            "0YYYYYYYY0      ",
            " 00000000       ",
            " 0YYYYYY0       ",
            " 00000000       ",
            "  0YYYY0        ",
            "   0000         ",
            "    00          ",
            "                ",
            "                ",
            "                "
        ];

        const beeBody2 = beeBody1.map(l => l.replace(/Y/g, 'P').replace(/y/g, 'p'));
        const beeBodyWalk2 = beeBodyWalk1.map(l => l.replace(/Y/g, 'P').replace(/y/g, 'p'));
        const beeBody3 = beeBody1.map(l => l.replace(/Y/g, 'R').replace(/y/g, 'r'));
        const beeBodyWalk3 = beeBodyWalk1.map(l => l.replace(/Y/g, 'R').replace(/y/g, 'r'));

        // Scale by 4 for BIGGER bees
        sprites['char_1_down'] = buildSprite(beeBody1, 4);
        sprites['char_1_walk'] = buildSprite(beeBodyWalk1, 4);
        sprites['char_2_down'] = buildSprite(beeBody2, 4);
        sprites['char_2_walk'] = buildSprite(beeBodyWalk2, 4);
        sprites['char_3_down'] = buildSprite(beeBody3, 4);
        sprites['char_3_walk'] = buildSprite(beeBodyWalk3, 4);

        const agents = [
            { id: 'Analyst (SEO)', key: 'SEO', num: 1, x: 0.5, y: 0.45, tX: 0.5, tY: 0.45, state: 'IDLE', speed: 0.003, frame: 0 },
            { id: 'Scout (Ads)', key: 'ADS', num: 2, x: 0.5, y: 0.55, tX: 0.5, tY: 0.55, state: 'IDLE', speed: 0.0025, frame: 0 },
            { id: 'Worker (Dev)', key: 'DEV', num: 3, x: 0.45, y: 0.45, tX: 0.45, tY: 0.45, state: 'IDLE', speed: 0.0028, frame: 0 }
        ];

        let tick = 0;
        const dialogBox = document.getElementById('dialog-box');
        const dialogName = document.getElementById('dialog-name');
        const dialogMsg = document.getElementById('dialog-msg');
        let dialogTimeout;

        function drawPortrait(charNum) {
            pCtx.clearRect(0, 0, 60, 60);
            const spr = sprites[`char_${charNum}_down`];
            if (spr) {
                // Scale portrait perfectly
                pCtx.drawImage(spr, -10, -5, 80, 80);
            }
        }

        function showDialog(agent, msg) {
            drawPortrait(agent.num);
            dialogName.textContent = agent.id;
            dialogMsg.textContent = "";
            dialogBox.classList.add('show');

            let i = 0;
            const typeWriter = setInterval(() => {
                dialogMsg.textContent += msg.charAt(i);
                i++;
                if (i >= msg.length) clearInterval(typeWriter);
            }, 20);

            clearTimeout(dialogTimeout);
            dialogTimeout = setTimeout(() => {
                dialogBox.classList.remove('show');
            }, 5000);
        }

        function updateUI(agentId, key, state, isBusy) {
            const el = document.getElementById(`Agent_${key}`);
            if (el) {
                el.innerHTML = `<span class="name">${agentId}</span> <span class="state ${isBusy ? 'busy' : ''}">${state}</span>`;
            }
        }

        const taskMsgs = {
            workstation: "Analyzing trends at the PC. Bzzzt!",
            library: "Reading up on strategies at the library.",
            bulletin: "Checking the notes in the hallway.",
            kitchen: "Grabbing a fresh cup of coffee!",
            lounge: "Relaxing on the sofa by the TV."
        };

        window.triggerTask = function (agentId, locationKey) {
            const agent = agents.find(a => a.id === agentId);
            if (!agent) return;

            const msg = taskMsgs[locationKey] || "Heading out! Bzzzt!";

            updateUI(agentId, agent.key, 'MOVING', true);
            showDialog(agent, msg);

            let target = POI[locationKey];
            if (Array.isArray(target)) target = target[Math.floor(Math.random() * target.length)];

            agent.tX = target.x;
            agent.tY = target.y;
            agent.state = 'MOVING';
        }

        function render() {
            tick++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const w = canvas.width;
            const h = canvas.height;
            let bgW = w;
            let bgH = h;
            let bgXOff = 0;
            let bgYOff = 0;

            if (w / h > 1) {
                bgW = h;
                bgXOff = (w - bgW) / 2;
            } else {
                bgH = w;
                bgYOff = (h - bgH) / 2;
            }

            const sortedAgents = [...agents].sort((a, b) => a.y - b.y);

            sortedAgents.forEach(a => {
                const dx = a.tX - a.x;
                const dy = a.tY - a.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0.005) {
                    a.x += (dx / dist) * a.speed;
                    a.y += (dy / dist) * a.speed;
                    a.frame++;
                } else {
                    a.x = a.tX; a.y = a.tY;
                    if (a.state === 'MOVING') {
                        a.state = 'WORKING';
                        updateUI(a.id, a.key, 'WORKING', true);

                        setTimeout(() => {
                            const spot = POI['hub'][Math.floor(Math.random() * POI['hub'].length)];
                            a.tX = spot.x; a.tY = spot.y;
                            a.state = 'RETURNING';
                            updateUI(a.id, a.key, 'RETURNING', false);
                            showDialog(a, `Job's done! Heading back to the center hub.`);
                        }, 5000);
                    } else if (a.state === 'RETURNING') {
                        a.state = 'IDLE';
                        updateUI(a.id, a.key, 'IDLE', false);
                    }
                }

                const screenX = bgXOff + a.x * bgW;
                const screenY = bgYOff + a.y * bgH;

                // Agent Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.ellipse(screenX, screenY + 40, 16, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Agent Sprite (Bigger bobbing bounds)
                const yBob = Math.sin(tick * 0.1 + a.num) * 5;
                let sprName = `char_${a.num}_down`;
                if ((a.state === 'MOVING' || a.state === 'RETURNING' || a.state === 'IDLE') && Math.floor(tick / 5) % 2 !== 0) {
                    sprName = `char_${a.num}_walk`;
                }

                if (sprites[sprName]) {
                    // Due to scale=4, the sprite is 64x64. Center it.
                    ctx.drawImage(sprites[sprName], screenX - 32, screenY - 32 + yBob);
                }

                // Working animation (!)
                if (a.state === 'WORKING' && Math.floor(tick / 20) % 2 === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(screenX - 4, screenY - 45 + yBob, 8, 16);
                    ctx.fillRect(screenX - 4, screenY - 25 + yBob, 8, 8);

                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(screenX - 4, screenY - 45 + yBob, 8, 16);
                    ctx.strokeRect(screenX - 4, screenY - 25 + yBob, 8, 8);
                }
            });

            requestAnimationFrame(render);
        }

        pCtx.width = 60; pCtx.height = 60;
        drawPortrait(1);
        render();

    </script>
</body>

</html>
