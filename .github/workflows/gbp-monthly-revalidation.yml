name: GBP Monthly Re-validation

on:
  schedule:
    # Run on 2nd of each month at 12:00 UTC
    # Re-fetches previous 3 months with accurate range queries
    - cron: '0 12 2 * *'
  workflow_dispatch:
    inputs:
      months_back:
        description: 'How many months back to re-validate (default: 3)'
        required: false
        default: '3'

jobs:
  revalidate:
    name: Re-validate GBP Historical Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Re-validate previous 3 months
        run: |
          echo "→ GBP Monthly Re-validation (range query accuracy fix)"

          # Calculate months to re-validate
          MONTHS_BACK="${{ github.event.inputs.months_back || '3' }}"

          for i in $(seq 1 $MONTHS_BACK); do
            # Get start/end of month i months ago
            START=$(date -d "-${i} month" +"%Y-%m-01" 2>/dev/null || date -v-${i}m +"%Y-%m-01")
            # Last day of that month
            END=$(date -d "${START} +1 month -1 day" +"%Y-%m-%d" 2>/dev/null || \
                  python3 -c "from datetime import date,timedelta; d=date.fromisoformat('${START}'); m=d.month%12+1; y=d.year+(d.month//12); print(date(y,m,1)-timedelta(days=1))")

            echo "→ Re-validating ${START} → ${END}"
            RESULT=$(curl -f -s -X GET \
              "${{ secrets.VERCEL_URL }}/api/admin/gbp-rebackfill?start=${START}&end=${END}" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -m 300 || echo '{"success":false,"error":"request failed"}')

            echo "$RESULT" | python3 -c "
import sys,json
d=json.load(sys.stdin)
rows=d.get('totalRows',0)
errs=len(d.get('errors') or [])
print(f'  rows={rows} errors={errs} ok={d.get(\"success\",False)}')
" 2>/dev/null || echo "  parse error: $RESULT"

            sleep 5
          done

          echo "→ GBP re-validation complete"
