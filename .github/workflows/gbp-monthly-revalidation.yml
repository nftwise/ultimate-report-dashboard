name: GBP Monthly Re-validation

on:
  schedule:
    - cron: '0 12 2 * *'   # 2nd of each month at 12:00 UTC
  workflow_dispatch:
    inputs:
      months_back:
        description: 'How many months back to re-validate (default: 3)'
        required: false
        default: '3'

jobs:
  revalidate:
    name: Re-validate GBP Historical Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Re-validate GBP
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/gbp-monthly-revalidation.ts --months ${{ github.event.inputs.months_back || '3' }}
        env:
          MONTHS_BACK: ${{ github.event.inputs.months_back || '3' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
