name: Sync Group B (CA North + Mountain + Central)

on:
  schedule:
    - cron: '0 10 * * *'  # 3:00 AM PDT = 10:00 UTC
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to sync (YYYY-MM-DD). Leave empty for yesterday.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Build date param
        id: dp
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "param=&date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "param=" >> $GITHUB_OUTPUT
          fi

      - name: Sync GA4 — Group B
        run: |
          echo "→ GA4 Group B"
          curl -f -s -X GET \
            "${{ secrets.VERCEL_URL }}/api/cron/sync-ga4?group=B${{ steps.dp.outputs.param }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" | jq '{success,clients,total,errors}'

      - name: Sync Ads — Group B
        run: |
          echo "→ Ads Group B"
          curl -f -s -X GET \
            "${{ secrets.VERCEL_URL }}/api/cron/sync-ads?group=B${{ steps.dp.outputs.param }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" | jq '{success,clients,total,errors}'

      - name: Sync GSC — Group B
        run: |
          echo "→ GSC Group B"
          curl -f -s -X GET \
            "${{ secrets.VERCEL_URL }}/api/cron/sync-gsc?group=B${{ steps.dp.outputs.param }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" | jq '{success,clients,total,errors}'

      - name: Sync GBP — Group B
        run: |
          echo "→ GBP Group B"
          curl -f -s -X GET \
            "${{ secrets.VERCEL_URL }}/api/cron/sync-gbp?group=B${{ steps.dp.outputs.param }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" | jq '{success,locations,synced,errors}'

      - name: Rollup — Group B
        run: |
          echo "→ Rollup Group B"
          curl -f -s -X GET \
            "${{ secrets.VERCEL_URL }}/api/admin/run-rollup?group=B${{ steps.dp.outputs.param }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" | jq '{success,processed}'
