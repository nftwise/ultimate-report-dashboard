name: Backfill Missing Data

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2026-04-07'
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2026-04-20'
      group:
        description: 'Sync group (A, B, C, or all)'
        required: false
        default: 'all'

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
  GOOGLE_PRIVATE_KEY_B64: ${{ secrets.GOOGLE_PRIVATE_KEY_B64 }}
  GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
  GOOGLE_ADS_MCC_ID: ${{ secrets.GOOGLE_ADS_MCC_ID }}
  GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
  FB_ADS_ACCESS_TOKEN: ${{ secrets.FB_ADS_ACCESS_TOKEN }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  backfill-group-a:
    name: Backfill Group A
    if: ${{ github.event.inputs.group == 'A' || github.event.inputs.group == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Backfill Group A
        run: |
          d="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          while [[ "$d" < "$END" ]] || [[ "$d" == "$END" ]]; do
            echo "=== $d ==="
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-ga4.ts --group A --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-ads.ts --group A --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-gsc.ts --group A --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-gbp.ts --group A --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/run-rollup.ts --group A || true
            d=$(date -d "$d + 1 day" +%Y-%m-%d)
          done
      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ <b>Backfill Group A FAILED</b>\nRange: ${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }}\",\"parse_mode\":\"HTML\"}"

  backfill-group-b:
    name: Backfill Group B
    if: ${{ github.event.inputs.group == 'B' || github.event.inputs.group == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Backfill Group B
        run: |
          d="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          while [[ "$d" < "$END" ]] || [[ "$d" == "$END" ]]; do
            echo "=== $d ==="
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-ga4.ts --group B --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-ads.ts --group B --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-gsc.ts --group B --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-gbp.ts --group B --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/run-rollup.ts --group B || true
            d=$(date -d "$d + 1 day" +%Y-%m-%d)
          done
      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ <b>Backfill Group B FAILED</b>\nRange: ${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }}\",\"parse_mode\":\"HTML\"}"

  backfill-group-c:
    name: Backfill Group C
    if: ${{ github.event.inputs.group == 'C' || github.event.inputs.group == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Backfill Group C
        run: |
          d="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          while [[ "$d" < "$END" ]] || [[ "$d" == "$END" ]]; do
            echo "=== $d ==="
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-ga4.ts --group C --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-ads.ts --group C --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-gsc.ts --group C --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-gbp.ts --group C --date "$d" || true
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/run-rollup.ts --group C || true
            d=$(date -d "$d + 1 day" +%Y-%m-%d)
          done
      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ <b>Backfill Group C FAILED</b>\nRange: ${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }}\",\"parse_mode\":\"HTML\"}"

  backfill-fb:
    name: Backfill Facebook Ads
    if: ${{ github.event.inputs.group == 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Backfill FB Ads
        run: |
          d="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          while [[ "$d" < "$END" ]] || [[ "$d" == "$END" ]]; do
            echo "=== FB $d ==="
            DATE=$d npx tsx --tsconfig scripts/tsconfig.json scripts/sync-fb-ads.ts --date "$d" || true
            d=$(date -d "$d + 1 day" +%Y-%m-%d)
          done
      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ <b>Backfill Facebook Ads FAILED</b>\nRange: ${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }}\",\"parse_mode\":\"HTML\"}"
