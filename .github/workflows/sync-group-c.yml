name: Sync Group C (East Coast + Europe)

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to sync (YYYY-MM-DD). Leave empty for yesterday.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATE: ${{ inputs.date }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
      GOOGLE_PRIVATE_KEY_B64: ${{ secrets.GOOGLE_PRIVATE_KEY_B64 }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_MCC_ID: ${{ secrets.GOOGLE_ADS_MCC_ID }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Sync GA4
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/sync-ga4.ts --group C
      - name: Sync Ads
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/sync-ads.ts --group C
      - name: Sync GSC
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/sync-gsc.ts --group C
      - name: Sync GBP
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/sync-gbp.ts --group C
      - name: Run Rollup
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/run-rollup.ts --group C
      - name: Verify data written
        run: |
          TARGET="${DATE:-$(TZ=America/Los_Angeles date -d yesterday +%Y-%m-%d)}"
          echo "→ Verifying client_metrics_summary for $TARGET (Group C)..."
          IDS=$(curl -s "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/clients?sync_group=eq.C&is_active=eq.true&select=id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" | jq -r '[.[].id] | join(",")')
          COUNT=$(curl -s "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/client_metrics_summary?client_id=in.(${IDS})&date=eq.${TARGET}&period_type=eq.daily&select=client_id" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" | jq 'length')
          echo "→ Records: $COUNT"
          if [ "$COUNT" -eq "0" ]; then
            echo "❌ No records for $TARGET — sync may have run without writing data"
            exit 1
          fi
          echo "✅ $COUNT clients verified for $TARGET"
      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"❌ <b>Sync Group C FAILED</b>\\n\\nTriggered: ${{ github.event_name }}\\n<a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">View logs</a>\",\"parse_mode\":\"HTML\"}"
