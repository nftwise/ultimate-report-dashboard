name: Sync Facebook Ads

on:
  schedule:
    - cron: '25 10 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to sync (YYYY-MM-DD). Leave empty for yesterday.'
        required: false
        default: ''
      clientId:
        description: 'Specific client UUID (optional). Leave empty for all clients.'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync Facebook Ads
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/sync-fb-ads.ts
        env:
          DATE: ${{ inputs.date }}
          CLIENT_ID: ${{ inputs.clientId }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FB_ADS_ACCESS_TOKEN: ${{ secrets.FB_ADS_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
