name: Refresh FB Ads Access Token

on:
  schedule:
    - cron: '0 10 1 * *'   # 1st of every month at 10:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      secrets: write   # needed to update FB_ADS_ACCESS_TOKEN secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Refresh FB token
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/refresh-fb-token.ts
        env:
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          FB_ADS_ACCESS_TOKEN: ${{ secrets.FB_ADS_ACCESS_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Auto-update GitHub Secret with new token
        run: |
          NEW_TOKEN=$(cat /tmp/fb_new_token.txt)
          echo "$NEW_TOKEN" | gh secret set FB_ADS_ACCESS_TOKEN --repo ${{ github.repository }}
          echo "✅ FB_ADS_ACCESS_TOKEN GitHub Secret updated automatically"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
