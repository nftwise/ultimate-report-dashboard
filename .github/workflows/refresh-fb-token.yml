name: Refresh FB Page Access Token

on:
  schedule:
    - cron: '0 10 1 * *'   # 1st of every month at 10:00 UTC (~every 30 days)
  workflow_dispatch:         # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Refresh FB Token
        run: |
          curl -s -X GET \
            "https://ultimate-report-dashboard.vercel.app/api/cron/refresh-fb-token" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | tee /tmp/result.json

          # Fail if not successful
          cat /tmp/result.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if not d.get('success'):
            print('FAILED:', d)
            sys.exit(1)
          print('SUCCESS: token expires in', d.get('expiresInDays'), 'days')
          "
