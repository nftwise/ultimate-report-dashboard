name: Biweekly Sheets Content Sync

on:
  schedule:
    - cron: '0 14 1,15 * *'  # 1st and 15th of month, 14:00 UTC (21:00 VN)
  workflow_dispatch:

jobs:
  sync:
    name: Sync Google Sheets blog posts → Mission Control
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Data11 repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase python-dotenv

      - name: Run sheets → CRM sync
        env:
          CRM_SUPABASE_URL: ${{ secrets.CRM_SUPABASE_URL }}
          CRM_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CRM_SUPABASE_SERVICE_ROLE_KEY }}
        run: python .github/scripts/sync_sheets.py

      - name: Notify Telegram on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"✅ <b>Sheets Content Sync DONE</b>\\nBlog posts từ Google Sheets đã sync vào Mission Control.\",\"parse_mode\":\"HTML\"}"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":\"❌ <b>Sheets Content Sync FAILED</b>\\n<a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">View logs</a>\",\"parse_mode\":\"HTML\"}"
